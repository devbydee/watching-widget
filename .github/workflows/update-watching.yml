name: Update Simkl Watching

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update watching.json
        run: node update.js
        env:
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_ACCESS_TOKEN: ${{ secrets.SIMKL_ACCESS_TOKEN }}

      - name: Commit updated watching.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add watching.json
          git diff --cached --quiet || git commit -m "Update watching widget"
          git push
