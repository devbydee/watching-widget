<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@font-face {
  font-family: "DOS";
  src: url("https://file.garden/ZswAc6hgIRcOzeXF/Web437_DOS-V_re_ANK24.woff2") format("woff2");
}

html,
body {
  margin: 0;
  padding: 0;
  background: transparent;
  color: #f0e7dc;
  font-family: "DOS", monospace;
  font-size: 11px;
  line-height: 1.45;
  overflow: hidden;
}

.watching-widget {
  width: 100%;
  box-sizing: border-box;
}

.label {
  color: rgba(240, 231, 220, 0.5);
  font-size: 10px;
  margin-bottom: 2px;
}

.title {
  color: rgba(255, 248, 240, 0.9);
  font-size: 11px;
  overflow-wrap: anywhere;
}

.subtitle,
.meta {
  color: rgba(240, 231, 220, 0.58);
  font-size: 10px;
  overflow-wrap: anywhere;
}

.meta {
  margin-top: 2px;
}
</style>
</head>

<body>
  <div class="watching-widget">
    <div class="label">watching:</div>
    <div class="title" id="watch-title">loading...</div>
    <div class="subtitle" id="watch-subtitle"></div>
    <div class="meta" id="watch-meta"></div>
  </div>

<script>
const titleEl = document.getElementById("watch-title");
const subtitleEl = document.getElementById("watch-subtitle");
const metaEl = document.getElementById("watch-meta");

function sendHeight() {
  window.parent.postMessage(
    {
      type: "d-watching-height",
      height: document.documentElement.scrollHeight
    },
    "*"
  );
}

function relativeTime(dateText) {
  if (!dateText) return "";

  const date = new Date(dateText);
  if (Number.isNaN(date.getTime())) return "";

  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);

  if (mins < 1) return "just now";
  if (mins < 60) return mins + " min ago";
  if (hours < 24) return hours + " hours ago";
  return days + " days ago";
}

fetch("watching.json?cache=" + Date.now())
  .then(response => response.json())
  .then(data => {
    titleEl.textContent = data.title || "nothing tracked rn";
    subtitleEl.textContent = data.subtitle || "";
    metaEl.textContent = data.watched_at ? relativeTime(data.watched_at) : (data.meta || "");

    requestAnimationFrame(sendHeight);
  })
  .catch(() => {
    titleEl.textContent = "nothing tracked rn";
    subtitleEl.textContent = "";
    metaEl.textContent = "simkl unavailable";

    requestAnimationFrame(sendHeight);
  });

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
new ResizeObserver(sendHeight).observe(document.body);
</script>
</body>
</html>
